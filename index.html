<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DroneScout — Autonomous ISR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#090B08;--panel:#11150E;--panel2:#0C0F0A;--edge:#232B1D;
    --feed:#060806;--hud:#FFB02E;--hud-dim:#937431;--ink:#D9E1D0;--dim:#727B66;
    --high:#FF4438;--med:#FFB02E;--low:#46D17F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--ink);font-family:"IBM Plex Mono",monospace;font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .lbl{font-family:"Chakra Petch",sans-serif;text-transform:uppercase;letter-spacing:.12em}

  /* ── shell: header + body ── */
  .shell{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh}

  header{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--edge);background:linear-gradient(180deg,#0E120C,#0A0D08);flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px}
  .brand svg{width:20px;height:20px;flex:none}
  .brand h1{font-family:"Chakra Petch";font-weight:700;font-size:18px;letter-spacing:.16em;text-transform:uppercase;line-height:1}
  .brand small{display:block;color:var(--dim);font-size:10px;letter-spacing:.18em;margin-top:2px}
  .spacer{flex:1}
  .clock-wrap{text-align:right;line-height:1.2}
  .clock-wrap span{display:block;color:var(--dim);font-size:9px;letter-spacing:.14em;text-transform:uppercase}
  .clock-wrap b{font-variant-numeric:tabular-nums;color:var(--hud);font-size:14px;letter-spacing:.06em}
  .stat{display:flex;align-items:center;gap:7px;border:1px solid var(--edge);padding:5px 11px;border-radius:2px;background:#0B0E08}
  .led{width:8px;height:8px;border-radius:50%;background:var(--dim);flex:none}
  .led.on{background:var(--low);box-shadow:0 0 8px var(--low)}
  .led.armed{background:var(--high);box-shadow:0 0 8px var(--high);animation:blink 1.3s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  /* ── body: left column + report column ── */
  .body{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(290px,1fr);gap:1px;background:var(--edge);min-height:0;overflow:hidden}
  .col{background:var(--panel);display:flex;flex-direction:column;min-height:0;overflow:hidden}

  /* ── left column: feed (flex:1) + controls + log ── */
  .left{display:flex;flex-direction:column;min-height:0}

  /* FEED — fills all remaining space */
  .feed{
    position:relative;background:var(--feed);flex:1;min-height:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  /* video and still: contained, centered, never overflow */
  #vid{
    display:none;width:100%;height:100%;object-fit:contain;
    filter:saturate(.85) contrast(1.05);
  }
  #still{
    display:none;max-width:100%;max-height:100%;width:auto;height:auto;
    object-fit:contain;filter:saturate(.85) contrast(1.05);
  }
  .feed-empty{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;
    color:var(--dim);text-align:center;padding:24px;pointer-events:none;
  }
  .feed-empty svg{width:32px;height:32px;opacity:.4}

  /* HUD overlay — pointer-events none, sits over everything */
  .hud{position:absolute;inset:0;pointer-events:none;color:var(--hud);font-size:11px;letter-spacing:.06em;text-shadow:0 0 6px rgba(255,176,46,.3);z-index:2}
  .br{position:absolute;width:24px;height:24px;border-color:var(--hud);opacity:.8}
  .br.tl{top:10px;left:10px;border-top:1.5px solid;border-left:1.5px solid}
  .br.tr{top:10px;right:10px;border-top:1.5px solid;border-right:1.5px solid}
  .br.bl{bottom:10px;left:10px;border-bottom:1.5px solid;border-left:1.5px solid}
  .br.brr{bottom:10px;right:10px;border-bottom:1.5px solid;border-right:1.5px solid}
  .reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;opacity:.45}
  .tele{position:absolute;font-family:"IBM Plex Mono";white-space:pre;font-size:10px}
  .tele.tl{top:14px;left:42px}.tele.tr{top:14px;right:16px;text-align:right}
  .tele.bl{bottom:14px;left:16px}.tele.brr{bottom:14px;right:16px;text-align:right}
  .rec{display:inline-flex;align-items:center;gap:5px}
  .rec b{width:6px;height:6px;border-radius:50%;background:var(--high);display:inline-block;animation:blink 1.1s infinite}

  /* detection boxes */
  .det-layer{position:absolute;inset:0;pointer-events:none;z-index:3}
  .det{position:absolute;border:1.5px solid var(--hud)}
  .det.hi{border-color:var(--high)}.det.med{border-color:var(--med)}.det.low{border-color:var(--low)}
  .det b{position:absolute;top:-16px;left:-1.5px;font-family:"IBM Plex Mono";font-size:10px;
    background:var(--hud);color:#1a1407;padding:0 5px;white-space:nowrap}
  .det.hi b{background:var(--high);color:#1a0605}.det.low b{background:var(--low);color:#06140b}

  /* scan animation */
  .scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--hud),transparent);
    top:0;opacity:0;box-shadow:0 0 12px var(--hud);z-index:4}
  .feed.scanning .scan{animation:sweep 1.6s linear infinite;opacity:.9}
  @keyframes sweep{0%{top:-2%}100%{top:102%}}
  .feed.scanning::after{content:"ANALYZING";position:absolute;top:12px;left:50%;transform:translateX(-50%);
    font-family:"Chakra Petch";letter-spacing:.3em;font-size:11px;color:var(--hud);animation:blink 1s infinite;z-index:5}

  /* ── controls bar ── */
  .controls{
    display:flex;align-items:center;gap:8px;padding:9px 12px;
    border-top:1px solid var(--edge);background:var(--panel2);flex-wrap:wrap;flex-shrink:0;
  }
  .seg{display:flex;border:1px solid var(--edge);border-radius:2px;overflow:hidden;flex-shrink:0}
  .seg button{font-family:"Chakra Petch";text-transform:uppercase;letter-spacing:.08em;font-size:12px;
    padding:7px 13px;background:#0B0E08;color:var(--dim);border:none;cursor:pointer;transition:.1s}
  .seg button.on{background:var(--hud);color:#1a1407}
  .arm{font-family:"Chakra Petch";text-transform:uppercase;letter-spacing:.1em;font-size:13px;font-weight:600;
    padding:8px 18px;border-radius:2px;border:1px solid var(--low);background:#0c1a10;color:var(--low);cursor:pointer;transition:.12s;flex-shrink:0}
  .arm:hover{background:#102a18}
  .arm.live{border-color:var(--high);color:#ffb0aa;background:#1a0807}
  .arm:focus-visible,.seg button:focus-visible{outline:2px solid var(--hud);outline-offset:2px}
  .sel{display:flex;align-items:center;gap:6px;color:var(--dim);font-size:11px;flex-shrink:0}
  select{background:#0B0E08;color:var(--ink);border:1px solid var(--edge);font-family:"IBM Plex Mono";font-size:12px;padding:5px 7px;border-radius:2px}
  .cbtn{font-family:"Chakra Petch";text-transform:uppercase;letter-spacing:.08em;font-size:12px;padding:7px 13px;
    border:1px dashed var(--edge);border-radius:2px;background:#0B0E08;color:var(--dim);cursor:pointer;flex-shrink:0}
  .cbtn:hover{border-color:var(--hud);color:var(--hud)}
  .cbtn.act{border-color:var(--hud);color:var(--hud);border-style:solid}
  .hidec{display:none !important}

  /* ── event log — grows to fill remaining space, min 120px ── */
  .log{
    border-top:1px solid var(--edge);background:var(--panel2);
    display:flex;flex-direction:column;min-height:120px;max-height:28vh;flex-shrink:0;
  }
  .log-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 12px;border-bottom:1px solid var(--edge);flex-shrink:0;
  }
  .log-head span{color:var(--dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  .log-rows{overflow-y:auto;flex:1}
  .lrow{display:flex;gap:8px;align-items:baseline;padding:5px 12px;border-bottom:1px solid #16190f;cursor:pointer;font-size:12px}
  .lrow:hover{background:#0f130c}
  .lrow.active{background:#13180f}
  .lrow .tm{color:var(--dim);font-size:10px;flex:none;width:58px;font-variant-numeric:tabular-nums}
  .lrow .chip{flex:none;font-family:"Chakra Petch";font-size:9px;letter-spacing:.06em;padding:1px 5px;border:1px solid currentColor;border-radius:2px}
  .lrow .sm{color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip.HIGH,.t-HIGH{color:var(--high)}.chip.MEDIUM,.t-MEDIUM{color:var(--med)}.chip.LOW,.t-LOW{color:var(--low)}

  /* ── report column ── */
  .report-col{display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .rhead{padding:11px 14px;border-bottom:1px solid var(--edge);background:var(--panel2);flex-shrink:0}
  .rhead .lbl{color:var(--dim);font-size:10px}
  .rhead h2{font-family:"Chakra Petch";font-weight:700;font-size:15px;letter-spacing:.1em;margin:3px 0 0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .err{margin:10px 14px 0;border:1px solid var(--high);background:#170706;color:#ffb1ab;border-radius:3px;padding:9px 11px;font-size:12px;display:none;flex-shrink:0}
  .err.on{display:block}
  .rbody{padding:14px;overflow-y:auto;flex:1;min-height:0}
  .empty-msg{color:var(--dim);text-align:center;line-height:1.8;padding:40px 16px;font-size:13px}
  .threat-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .tbadge{font-family:"Chakra Petch";font-weight:700;letter-spacing:.08em;font-size:14px;padding:6px 12px;border:2px solid currentColor;border-radius:3px;flex-shrink:0}
  .summary{font-size:13px;line-height:1.55;color:var(--ink)}
  .rationale{font-size:12px;color:var(--dim);margin:8px 0 14px;border-left:2px solid var(--edge);padding-left:9px}
  .salute-table{border:1px solid var(--edge);border-radius:3px;overflow:hidden;margin-bottom:12px}
  .srow{display:grid;grid-template-columns:68px 1fr;border-bottom:1px solid var(--edge)}
  .srow:last-child{border-bottom:none}
  .srow .k{background:var(--panel2);color:var(--hud);font-family:"Chakra Petch";font-size:9px;letter-spacing:.06em;
    padding:8px 8px;border-right:1px solid var(--edge);text-transform:uppercase;line-height:1.3}
  .srow .k small{display:block;color:var(--dim);font-size:9px;margin-top:1px}
  .srow .v{padding:8px 10px;font-size:12px;color:var(--ink);word-break:break-word}
  .detlist{margin-top:10px}
  .detlist .lbl{color:var(--dim);font-size:10px;margin-bottom:6px;display:block}
  .detlist .tags{display:flex;flex-wrap:wrap;gap:5px}
  .detlist .tags span{font-size:11px;border:1px solid var(--edge);border-radius:2px;padding:2px 7px;color:var(--ink)}
  .archived-note{font-size:10px;color:var(--hud-dim);letter-spacing:.1em;margin-bottom:10px;display:block}

  @media (max-width:860px){
    .body{grid-template-columns:1fr}
    .report-col{max-height:50vh;border-top:1px solid var(--edge)}
    .log{max-height:22vh}
    .brand small{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    .led.armed,.rec b,.feed.scanning::after{animation:none}
    .feed.scanning .scan{animation:none;top:50%;opacity:.5}
  }
</style>

<div class="shell">
  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--hud)" stroke-width="1.6">
        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <div><h1>DroneScout</h1><small class="lbl">Autonomous ISR</small></div>
    </div>
    <div class="spacer"></div>
    <div class="clock-wrap"><span>Mission</span><b id="clock">00:00:00</b></div>
    <div class="stat"><span class="led" id="led"></span><span class="lbl" id="statTxt" style="font-size:11px">Standby</span></div>
  </header>

  <div class="body">
    <!-- LEFT: feed + controls + log -->
    <div class="col left">
      <div class="feed" id="feedEl">
        <video id="vid" playsinline muted autoplay></video>
        <img id="still" alt="loaded frame">
        <div class="feed-empty lbl" id="feedEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          No feed — arm for live camera, or switch to Image
        </div>
        <div class="hud">
          <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br brr"></div>
          <svg class="reticle" viewBox="0 0 50 50" fill="none" stroke="var(--hud)" stroke-width=".9">
            <path d="M25 4v12M25 34v12M4 25h12M34 25h12"/><circle cx="25" cy="25" r="8"/>
          </svg>
          <div class="tele tl" id="telTL">DRONESCOUT ISR</div>
          <div class="tele tr" id="telTR"></div>
          <div class="tele bl" id="telBL"></div>
          <div class="tele brr" id="telBR"></div>
          <div class="det-layer" id="detLayer"></div>
        </div>
        <div class="scan"></div>
      </div>

      <div class="controls">
        <div class="seg" role="tablist">
          <button id="mLive" class="on" role="tab">Live</button>
          <button id="mImg" role="tab">Image</button>
        </div>
        <button class="arm" id="armBtn">▶ Arm</button>
        <button class="cbtn hidec" id="loadBtn">⬆ Load frame</button>
        <button class="cbtn act hidec" id="analyzeBtn">⦿ Analyze</button>
        <input type="file" id="file" accept="image/*" style="display:none">
        <div class="sel" id="intervalWrap">
          <span class="lbl" style="font-size:10px">Scan</span>
          <select id="interval">
            <option value="5">5s</option><option value="10" selected>10s</option>
            <option value="15">15s</option><option value="30">30s</option>
          </select>
        </div>
      </div>

      <div class="log">
        <div class="log-head">
          <span class="lbl" style="font-size:10px">Event log</span>
          <span id="logCount" style="color:var(--dim);font-size:10px">0 reports</span>
        </div>
        <div class="log-rows" id="logRows"></div>
      </div>
    </div>

    <!-- RIGHT: report -->
    <div class="col report-col">
      <div class="rhead">
        <div class="lbl" style="color:var(--dim);font-size:10px">Intelligence report</div>
        <h2 id="rTitle">Awaiting analysis</h2>
      </div>
      <div class="err" id="err"></div>
      <div class="rbody" id="rBody">
        <div class="empty-msg">Standing by.<br>Arm the feed or load an image<br>to begin autonomous analysis.</div>
      </div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const state={
  mode:"live",armed:false,busy:false,stream:null,
  timer:null,clock:null,t0:0,
  reports:[],seq:0,
  imgData:null,imgType:"image/jpeg",
  activeReportId:null,
};

/* ── telemetry sim ── */
let tel={lat:34.0522,lon:-118.2437,alt:412,hdg:247,spd:18};
const pad2=n=>String(n).padStart(2,"0");
function fmtLat(v){return Math.abs(v).toFixed(4)+(v>=0?"N":"S")}
function fmtLon(v){return Math.abs(v).toFixed(4)+(v>=0?"E":"W")}
function coordStr(){return fmtLat(tel.lat)+" "+fmtLon(tel.lon)}
function zulu(){const d=new Date();return pad2(d.getUTCHours())+pad2(d.getUTCMinutes())+pad2(d.getUTCSeconds())+"Z"}
function driftTel(){tel.lat+=(Math.random()-.5)*3e-4;tel.lon+=(Math.random()-.5)*3e-4;
  tel.alt+=Math.round((Math.random()-.5)*5);tel.hdg=(tel.hdg+(Math.random()-.4)*2+360)%360;tel.spd=Math.max(0,tel.spd+(Math.random()-.5)*.5);}
function renderTele(){
  $("telTR").innerHTML='<span class="rec"><b></b>REC</span>  '+zulu();
  $("telBL").textContent=coordStr()+"  ALT "+Math.round(tel.alt)+"m";
  $("telBR").textContent="HDG "+String(Math.round(tel.hdg)).padStart(3,"0")+"°  SPD "+tel.spd.toFixed(0)+"m/s";
}
setInterval(()=>{driftTel();renderTele();},1000);renderTele();

/* ── mission clock ── */
function startClock(){state.t0=Date.now();state.clock=setInterval(()=>{
  const s=Math.floor((Date.now()-state.t0)/1000);
  $("clock").textContent=pad2(s/3600|0)+":"+pad2((s/60|0)%60)+":"+pad2(s%60);},1000);}
function stopClock(){clearInterval(state.clock);$("clock").textContent="00:00:00";}

/* ── RESET helpers — always called on mode switch or new content ── */
function resetFeedVisuals(){
  // clear old boxes and old report — new frame = new analysis
  clearBoxes();
  resetReport();
}
function resetReport(){
  // wipe the report panel back to "awaiting"
  $("rTitle").textContent="Awaiting analysis";
  $("rBody").innerHTML='<div class="empty-msg">New frame loaded.<br>Press Analyze (or wait for auto-scan).</div>';
  state.activeReportId=null;
  // remove active highlight from log
  [...$("logRows").querySelectorAll(".lrow")].forEach(r=>r.classList.remove("active"));
}

/* ── mode switching ── */
function setMode(m){
  state.mode=m;
  if(state.armed) disarm();
  $("mLive").classList.toggle("on",m==="live");
  $("mImg").classList.toggle("on",m==="image");
  $("armBtn").classList.toggle("hidec",m!=="live");
  $("intervalWrap").classList.toggle("hidec",m!=="live");
  $("loadBtn").classList.toggle("hidec",m!=="image");
  $("analyzeBtn").classList.toggle("hidec",m!=="image");
  // hide both media elements, show empty state
  $("vid").style.display="none";
  $("still").style.display="none";
  $("still").src="";
  $("feedEmpty").style.display="flex";
  state.imgData=null;
  resetFeedVisuals();
  clearErr();
}
$("mLive").onclick=()=>setMode("live");
$("mImg").onclick=()=>setMode("image");

/* ── live camera ── */
async function arm(){
  try{
    state.stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720},audio:false});
    $("vid").srcObject=state.stream;
    $("vid").style.display="block";
    $("feedEmpty").style.display="none";
    await $("vid").play();
    state.armed=true;
    $("armBtn").textContent="■ Disarm";$("armBtn").classList.add("live");
    $("led").className="led armed";$("statTxt").textContent="Armed";
    startClock();
    resetFeedVisuals(); // clear any leftover from previous session
    analyzeFrame();     // immediate first pass
    const ms=+$("interval").value*1000;
    state.timer=setInterval(()=>{if(!state.busy)analyzeFrame();},ms);
  }catch(e){
    showErr("Camera unavailable — grant permission or use Image mode. ("+e.name+")");
  }
}
function disarm(){
  state.armed=false;clearInterval(state.timer);state.timer=null;stopClock();
  if(state.stream){state.stream.getTracks().forEach(t=>t.stop());state.stream=null;}
  $("vid").style.display="none";
  $("armBtn").textContent="▶ Arm";$("armBtn").classList.remove("live");
  $("led").className="led";$("statTxt").textContent="Standby";
  $("feedEl").classList.remove("scanning");
  $("feedEmpty").style.display="flex";
  clearBoxes(); // clear boxes when disarming
}
$("armBtn").onclick=()=>state.armed?disarm():arm();

/* ── image load ── */
$("loadBtn").onclick=()=>$("file").click();
function loadImageFile(f){
  if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    state.imgData=r.result;
    state.imgType=f.type||"image/jpeg";
    const img=$("still");
    img.onload=()=>{
      img.style.display="block";
      $("feedEmpty").style.display="none";
      resetFeedVisuals(); // ← clears boxes + resets report every new image
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
$("file").onchange=e=>{loadImageFile(e.target.files[0]);e.target.value="";};
$("feedEl").addEventListener("dragover",e=>e.preventDefault());
$("feedEl").addEventListener("drop",e=>{
  e.preventDefault();
  if(state.mode!=="image")setMode("image");
  loadImageFile(e.dataTransfer.files[0]);
});
$("analyzeBtn").onclick=()=>{
  if(!state.imgData){showErr("Load a frame first.");return;}
  resetFeedVisuals(); // clear old boxes before new analysis
  analyzeImage();
};

/* ── frame capture ── */
function grabFrame(){
  const v=$("vid");if(!v.videoWidth)return null;
  const w=720,h=Math.round(720*v.videoHeight/v.videoWidth);
  const c=document.createElement("canvas");c.width=w;c.height=h;
  c.getContext("2d").drawImage(v,0,0,w,h);
  return c.toDataURL("image/jpeg",.75);
}
function analyzeFrame(){const d=grabFrame();if(!d)return;runAnalysis(d.split(",")[1],"image/jpeg");}
function analyzeImage(){runAnalysis(state.imgData.split(",")[1],state.imgType);}

/* ── Claude Vision (ISR analyst) ── */
const SYS=
"You are DRONESCOUT, an autonomous ISR analyst embedded in a reconnaissance drone. "+
"Analyse the frame like a trained imagery analyst. Report ONLY what is observable — never invent. "+
"Note objects of military or security interest (personnel, vehicles, aircraft, drones, structures, equipment, movement, anomalies). If benign, say so plainly.\n"+
"Respond with ONLY a JSON object, no other text:\n"+
'{"salute":{"size":"<count e.g. 2x personnel, 1x vehicle or none observed>","activity":"<what is happening>",'+
'"location":"<frame-relative position>","unit":"<affiliation or unknown>","time":"current","equipment":"<equipment or none observed>"},'+
'"detections":[{"label":"<short label>","box":[x,y,w,h],"conf":0.0}],'+
'"threat":{"level":"LOW|MEDIUM|HIGH","rationale":"<one sentence>"},'+
'"summary":"<one plain sentence>"}\n'+
"box = percentage of frame (0-100), x/y = top-left corner, w/h = width/height. Max 5 detections. "+
"LOW = benign. MEDIUM = unidentified or possible interest. HIGH = clear threat (armed personnel, military vehicle, hostile UAS, restricted-zone intrusion).";

async function runAnalysis(b64,mediaType){
  if(state.busy)return;
  state.busy=true;clearErr();
  $("feedEl").classList.add("scanning");
  try{
    const res=await fetch("/api/claude",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1024,system:SYS,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
          {type:"text",text:"Analyse this drone frame. Location: "+coordStr()+", ALT "+Math.round(tel.alt)+"m. JSON only."}
        ]}]})
    });
    if(!res.ok)throw new Error("link "+res.status);
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    const parsed=parseJSON(text);
    if(!parsed)throw new Error("could not parse analysis");
    commit(parsed);
  }catch(e){
    showErr("Analysis unavailable ("+e.message+"). Deploy to Vercel with ANTHROPIC_API_KEY to enable AI.");
  }finally{
    state.busy=false;
    $("feedEl").classList.remove("scanning");
  }
}
function parseJSON(t){if(!t)return null;let s=t.replace(/```json|```/g,"").trim();
  const a=s.indexOf("{"),b=s.lastIndexOf("}");if(a>=0&&b>a)s=s.slice(a,b+1);
  try{return JSON.parse(s)}catch(e){return null}}

/* ── commit report ── */
function commit(d){
  const id=++state.seq;
  const rep={id,time:zulu(),coord:coordStr(),
    level:((d.threat&&d.threat.level)||"LOW").toUpperCase(),
    rationale:(d.threat&&d.threat.rationale)||"",
    summary:d.summary||"",salute:d.salute||{},
    detections:Array.isArray(d.detections)?d.detections:[]};
  state.reports.unshift(rep);
  renderReport(rep,false);   // show latest in report panel
  drawBoxes(rep.detections); // draw boxes for latest
  renderLog();               // update log list
}

/* ── render report ── */
function renderReport(r,archived){
  $("rTitle").textContent="RPT-"+String(r.id).padStart(3,"0")+"  "+r.time;
  state.activeReportId=r.id;
  const s=r.salute||{};
  const cell=(k,sub,v)=>`<div class="srow"><div class="k">${k}<small>${sub}</small></div><div class="v">${esc(v||"—")}</div></div>`;
  $("rBody").innerHTML=
    (archived?`<span class="archived-note">⟲ Archived report — recalled from log</span>`:"")+
    `<div class="threat-row">
      <span class="tbadge t-${r.level}">${r.level}</span>
      <span class="summary">${esc(r.summary)}</span>
    </div>`+
    (r.rationale?`<div class="rationale">${esc(r.rationale)}</div>`:"")+
    `<div class="salute-table">`+
      cell("S","size",s.size)+cell("A","activity",s.activity)+
      cell("L","location",r.coord+(s.location?" — "+s.location:""))+
      cell("U","unit",s.unit)+cell("T","time",r.time)+cell("E","equipment",s.equipment)+
    `</div>`+
    (r.detections.length
      ?`<div class="detlist"><span class="lbl">Detections (${r.detections.length})</span><div class="tags">`+
        r.detections.map(x=>`<span>${esc(x.label)}${x.conf!=null?" · "+Math.round(x.conf*100)+"%":""}</span>`).join("")+
       `</div></div>`
      :"");
  // highlight active row in log
  [...$("logRows").querySelectorAll(".lrow")].forEach(el=>{
    el.classList.toggle("active",+el.dataset.id===r.id);
  });
}

/* ── detection boxes ── */
function drawBoxes(dets){
  const L=$("detLayer");L.innerHTML="";
  (dets||[]).forEach(x=>{
    const b=x.box;if(!Array.isArray(b)||b.length<4)return;
    const el=document.createElement("div");el.className="det";
    el.style.left=clamp(b[0])+"%";el.style.top=clamp(b[1])+"%";
    el.style.width=clamp(b[2])+"%";el.style.height=clamp(b[3])+"%";
    el.innerHTML=`<b>${esc(x.label)}</b>`;
    L.appendChild(el);
  });
}
function clearBoxes(){$("detLayer").innerHTML="";}
function clamp(n){n=+n;return isNaN(n)?0:Math.max(0,Math.min(100,n));}

/* ── event log ── */
function renderLog(){
  $("logCount").textContent=state.reports.length+" report"+(state.reports.length===1?"":"s");
  $("logRows").innerHTML=state.reports.map(r=>
    `<div class="lrow${r.id===state.activeReportId?" active":""}" data-id="${r.id}">
       <span class="tm">${r.time}</span>
       <span class="chip ${r.level}">${r.level}</span>
       <span class="sm">${esc(r.summary||"—")}</span>
     </div>`).join("");
  [...$("logRows").querySelectorAll(".lrow")].forEach(el=>el.onclick=()=>{
    const r=state.reports.find(x=>x.id==el.dataset.id);
    if(!r)return;
    renderReport(r,true);
    // when replaying from log: show that report's boxes
    drawBoxes(r.detections);
    renderLog(); // re-render to update active highlight
  });
}

/* ── util ── */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function showErr(m){$("err").textContent=m;$("err").classList.add("on");}
function clearErr(){$("err").classList.remove("on");}

// init
setMode("live");
</script>
